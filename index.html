<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Racers</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

#game{
    max-width:600px;
    margin:auto;
    padding:15px;
}

#levelTitle{
    font-size:7vw;
    font-weight:bold;
    margin-top:10px;
}

#questionBox{
    margin-top:40px;
    font-size:5.5vw;
    line-height:1.4;
}

.option{
    display:block;
    width:100%;
    margin:18px auto;
    padding:18px;
    border:2px solid white;
    border-radius:12px;
    cursor:pointer;
    font-size:5vw;
    transition:0.2s;
}

.option:hover{
    background:white;
    color:black;
}

#gameOver{
    font-size:10vw;
    margin-top:30px;
    display:none;
}

#playAgain{
    display:none;
    margin:30px auto;
    padding:18px 30px;
    font-size:6vw;
    font-weight:bold;
    background:white;
    color:black;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

@media (min-width:700px){
    #levelTitle{font-size:36px;}
    #questionBox{font-size:22px;}
    .option{font-size:20px;}
    #gameOver{font-size:50px;}
    #playAgain{font-size:26px;}
}
</style>
</head>

<body>

<div id="game">
<div id="levelTitle"></div>
<div id="questionBox"></div>
<div id="options"></div>
<div id="gameOver">GAME OVER</div>
<button id="playAgain">PLAY AGAIN</button>
</div>

<script>
const levels = [
{
name:"Level 1 - Easy",
questions:[
{q:"Action = pulled out a block from the base of a building  Reaction = ?",options:["The building fell","The building is erect","The building is wobbly"],answer:2},
{q:"Action = turned a gear clockwise. That gear is connected to another gear Reaction = ?",options:["The other gear turned clockwise","The other gear turned anti - clockwise","The other gear didn’t turn at all"],answer:1},
{q:"Action = Pulling a rope in a game of tug and war Reaction = ?",options:["Makes not difference in the game","Makes the other side topple over","Helps your team win the game"],answer:2}
]},
{
name:"Level 2 - Medium",
questions:[
{q:"Action = turned a gear clockwise which is connected to another gear which is connected to yet another gear. Reaction =?",options:["The other gear turned clockwise","The other gear turned anti - clockwise","The other gear didn’t turn at all"],answer:0},
{q:"Action = You mix baking soda and vinegar Reaction =?",options:["Carbon dioxide is formed","Oxygen is formed","Nitrogen is formed"],answer:0},
{q:"Action = You mix vinegar and milk Reaction = ?",options:["The milk turns sour","The milk becomes paneer","The milk becomes dried up"],answer:1}
]},
{
name:"Level 3 - Hard",
questions:[
{q:"Action = Pushing one domino in a chain of equidistance dominos Reaction = ?",options:["All the dominos fall","No dominos fall","Neither"],answer:0},
{q:"Action = turned a gear which is connected to three other gears in a chain anticlockwise Reaction = ?",options:["The last gear turns anti - clockwise","The last gear turns clockwise","Neither"],answer:1},
{q:"Action = Plant receives sunlight and water Reaction = ?",options:["The plant becomes dried up","The plant produces food","The plant’s roots start rotting"],answer:1}
]}
];

let levelIndex=0;
let questionIndex=0;
let gameEnded=false;

const levelTitle=document.getElementById("levelTitle");
const questionBox=document.getElementById("questionBox");
const optionsBox=document.getElementById("options");
const gameOverText=document.getElementById("gameOver");
const playAgainBtn=document.getElementById("playAgain");

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function startGame(){
gameEnded=false;
gameOverText.style.display="none";
playAgainBtn.style.display="none";
levelIndex=0;
questionIndex=0;
levels.forEach(l=>shuffle(l.questions));
loadQuestion();
}

function loadQuestion(){
if(gameEnded) return;

if(levelIndex>=levels.length){
gameOver("YOU WON!");
return;
}

const level=levels[levelIndex];
const question=level.questions[questionIndex];

levelTitle.innerText=level.name;
questionBox.innerText=question.q;
optionsBox.innerHTML="";

question.options.forEach((opt,i)=>{
const btn=document.createElement("div");
btn.className="option";
btn.innerText=opt;
btn.onclick=()=>selectAnswer(i);
optionsBox.appendChild(btn);
});
}

function selectAnswer(choice){
if(gameEnded) return;

const correct=levels[levelIndex].questions[questionIndex].answer;

if(choice!==correct){
gameOver("GAME OVER");
return;
}

questionIndex++;
if(questionIndex>=levels[levelIndex].questions.length){
levelIndex++;
questionIndex=0;
}
loadQuestion();
}

function gameOver(text){
gameEnded=true;
optionsBox.innerHTML="";
questionBox.innerHTML="";
levelTitle.innerHTML="";
gameOverText.innerText=text;
gameOverText.style.display="block";
playAgainBtn.style.display="block";
}

playAgainBtn.onclick=startGame;
startGame();
</script>

</body>
</html>
